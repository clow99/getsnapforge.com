services:
  snapforge:
    container_name: snapforge
    image: 10.0.0.2:5000/snapforge:live
    env_file:
      - .env
    ports:
      - "4000:4000"
    restart: unless-stopped
    cpus: "0.50"
    mem_limit: 768m
    mem_reservation: 384m
    pids_limit: 200
    volumes:
      - snapforge-cache:/app/cache

  snapforge-demo:
    container_name: snapforge-demo
    image: 10.0.0.2:5000/snapforge-demo:live
    env_file:
      - .env
    ports:
      - "3020:3000"
    restart: unless-stopped
    cpus: "0.50"
    mem_limit: 768m
    mem_reservation: 384m
    pids_limit: 200
    depends_on:
      - snapforge

volumes:
  snapforge-cache:
