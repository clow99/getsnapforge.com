services:
  snapforge:
    build:
      context: .
      dockerfile: apps/screenshot-service/Dockerfile
    container_name: snapforge
    restart: unless-stopped
    ports:
      - "${SERVICE_PORT:-4000}:4000"
    environment:
      - SNAPFORGE_API_KEY=${SNAPFORGE_API_KEY:?Set SNAPFORGE_API_KEY}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-300}
      - NAVIGATION_TIMEOUT_MS=${NAVIGATION_TIMEOUT_MS:-15000}
      - URL_ALLOWLIST=${URL_ALLOWLIST:-}
      - URL_DENYLIST=${URL_DENYLIST:-}
    volumes:
      - snapforge-cache:/app/cache

  snapforge-demo:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Snapforge}
    container_name: snapforge-demo
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    profiles:
      - demo

volumes:
  snapforge-cache:
