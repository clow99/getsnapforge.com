name: Build and Deploy Snapforge

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REGISTRY: localhost:5000
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build screenshot service image
        run: |
          docker build \
            --file apps/screenshot-service/Dockerfile \
            --tag "${REGISTRY}/snapforge:${{ gitea.sha }}" \
            --tag "${REGISTRY}/snapforge:live" \
            .

      - name: Build demo image
        run: |
          docker build \
            --file Dockerfile \
            --build-arg NEXT_PUBLIC_APP_URL="${{ vars.NEXT_PUBLIC_APP_URL }}" \
            --build-arg NEXT_PUBLIC_APP_NAME="${{ vars.NEXT_PUBLIC_APP_NAME }}" \
            --tag "${REGISTRY}/snapforge-demo:${{ gitea.sha }}" \
            --tag "${REGISTRY}/snapforge-demo:live" \
            .

      - name: Push images
        run: |
          docker push "${REGISTRY}/snapforge:${{ gitea.sha }}"
          docker push "${REGISTRY}/snapforge:live"
          docker push "${REGISTRY}/snapforge-demo:${{ gitea.sha }}"
          docker push "${REGISTRY}/snapforge-demo:live"
